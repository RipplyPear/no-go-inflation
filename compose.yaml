services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: no_go_inflation
      POSTGRES_USER: game_user
      POSTGRES_PASSWORD: game_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U game_user -d no_go_inflation"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: